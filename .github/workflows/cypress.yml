name: Cypress E2E

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  cypress:
    name: Run Cypress tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cypress-automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cypress-automation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress headless tests
        run: npm run cy:run

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress-automation/cypress/screenshots

      - name: Upload Cypress videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress-automation/cypress/videos
