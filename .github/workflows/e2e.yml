name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  cypress:
    name: Cypress E2E
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cypress-automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cypress-automation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npm run cy:run

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress-automation/cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress-automation/cypress/videos
          if-no-files-found: ignore

  selenium:
    name: Selenium Python E2E
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: selenium-automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: selenium-automation/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Selenium tests
        env:
          HEADLESS: "true"
        run: python -m pytest
